<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - Faculty Reviews</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <style>
        body { font-family: Inter, system-ui, -apple-system, Roboto, Arial; background:#f8fafc; color:#0f172a; }
        .container{max-width:1200px;margin:24px auto;padding:0 16px}
        .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
        .title{font-size:28px;font-weight:800}
        .section{background:#fff;padding:16px;border-radius:12px;margin-bottom:12px;border:1px solid #eef2ff}
        .grid{display:grid;grid-template-columns:2fr 1fr;gap:12px}
        table{width:100%;border-collapse:collapse}
        th,td{padding:8px;border-bottom:1px solid #eee}
        .btn{padding:6px 10px;border-radius:8px;border:none;cursor:pointer}
        .btn-danger{background:#ef4444;color:white}
        .btn-primary{background:#1d4ed8;color:white}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="title">Admin Dashboard</div>
        <div>Welcome, Admin</div>
    </div>

    <!-- display admin action errors (from flash attributes) -->
    <div th:if="${adminError}" style="background:#fff3f2;color:#b91c1c;padding:8px;border-radius:8px;margin-bottom:12px" th:text="${adminError}"></div>

    <div class="grid">
        <div>
            <div class="section">
                <h3>Users</h3>
                <table>
                    <thead><tr><th>ID</th><th>Username</th><th>Email</th><th>Role</th><th>Actions</th></tr></thead>
                    <tbody>
                    <tr th:each="u : ${users}">
                        <td th:text="${u.id}"></td>
                        <td th:text="${u.username}"></td>
                        <td th:text="${u.email}"></td>
                        <td th:text="${u.role}"></td>
                        <td>
                            <form th:action="@{/admin/users/{id}/enable(id=${u.id})}" method="post" style="display:inline-block">
                                <input type="hidden" name="enabled" th:value="${!u.enabled}" />
                                <button class="btn" type="submit" th:text="${u.enabled}? 'Suspend' : 'Enable'"></button>
                            </form>
                            <form th:action="@{/admin/users/{id}/delete(id=${u.id})}" method="post" style="display:inline-block">
                                <button class="btn btn-danger" type="submit">Delete</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="section">
                <h3>Reported Reviews</h3>
                <table>
                    <thead><tr><th>ID</th><th>Faculty</th><th>Comment</th><th>Actions</th></tr></thead>
                    <tbody>
                    <tr th:each="r : ${reportedReviews}">
                        <td th:text="${r.id}"></td>
                        <td th:text="${r.faculty.name}"></td>
                        <td th:text="${r.comment}"></td>
                        <td>
                            <form th:action="@{/admin/reviews/{id}/delete(id=${r.id})}" method="post">
                                <button class="btn btn-danger" type="submit">Delete</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div>
            <div class="section">
                <h3>Faculties</h3>
                <form th:action="@{/admin/faculties/add}" method="post">
                    <label>Name</label><br/>
                    <input type="text" name="name" required/><br/>
                    <label>Department</label><br/>
                    <select name="department.id">
                        <option th:each="d: ${departments}" th:value="${d.id}" th:text="${d.name}"></option>
                    </select><br/>
                    <label>Image Path (e.g. /images/foo.jpg)</label><br/>
                    <input type="text" name="imagePath" /><br/>
                    <button class="btn btn-primary" type="submit">Add Faculty</button>
                </form>
            </div>

            <div class="section">
                <h3>Departments</h3>
                <ul>
                    <li th:each="d: ${departments}" th:text="${d.name}"></li>
                </ul>
                <form th:action="@{/admin/departments/add}" method="post">
                    <input type="text" name="name" required/>
                    <button type="submit" class="btn btn-primary">Add</button>
                </form>
            </div>

            <div class="section">
                <h3>Audit Log</h3>
                <div style="max-height:300px;overflow:auto">
                    <table>
                        <thead><tr><th>When</th><th>Actor</th><th>Action</th><th>Details</th></tr></thead>
                        <tbody>
                        <tr th:each="a: ${auditLogs}">
                            <td th:text="${a.createdAt != null ? a.createdAt.format(T(java.time.format.DateTimeFormatter).ofPattern('yyyy-MM-dd HH:mm')) : '-'}"></td>
                             <td th:text="${a.actorUserId}"></td>
                             <td th:text="${a.action}"></td>
                             <td th:text="${a.details}"></td>
                         </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>
</body>
</html>
