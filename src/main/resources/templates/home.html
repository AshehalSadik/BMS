<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Faculty Reviews</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <style>
        /* Minimal Tailwind-like utility styles for quick layout (if not using Tailwind) */
        body { font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; background:#f8fafc; color:#0f172a; }
        .container{max-width:1100px;margin:40px auto;padding:0 16px}
        .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
        .title{font-size:32px;font-weight:800}
        .subtitle{color:#6b7280}
        .search{max-width:640px;margin:0 auto 16px;position:relative}
        .search input{width:100%;padding:12px 16px;border-radius:9999px;border:1px solid #e5e7eb}
        .pills{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:24px}
        .pill{padding:8px 14px;border-radius:9999px;background:#fff;border:1px solid #e6eef8;color:#334155;cursor:pointer}
        .pill.active{background:#1d4ed8;color:#fff;box-shadow:0 6px 12px rgba(29,78,216,0.12)}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:20px}
        .card{background:#fff;padding:20px;border-radius:16px;display:flex;align-items:center;justify-content:space-between;border:1px solid #f1f5f9}
        .card:hover{box-shadow:0 10px 30px rgba(2,6,23,0.08)}
        .info h3{font-size:22px;margin:0 0 6px}
        .tag{display:inline-block;padding:6px 10px;background:#eef2ff;color:#1d4ed8;border-radius:999px;font-weight:700;font-size:12px}
        .meta{color:#64748b;font-size:14px}
        .avatar{width:96px;height:96px;border-radius:9999px;overflow:hidden;border:4px solid #fff;background:#fff}
        .center{text-align:center}
        .profile{position:relative}
        .profile-menu{position:absolute;right:0;top:44px;background:#fff;border:1px solid #e6eef8;border-radius:8px;padding:8px;box-shadow:0 8px 24px rgba(2,6,23,0.08);display:none}
        .profile:hover .profile-menu{display:block}
        .profile a{display:block;padding:6px 10px;color:#0f172a;text-decoration:none}
        .profile a:hover{background:#f1f5f9}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div>
            <div class="title">FAST NUCES <span style="color:#1d4ed8">Faculty Reviews</span></div>
            <div class="subtitle">Find and review your instructors to help others.</div>
        </div>
        <div>
            <div class="profile">
                <div th:if="${currentUser != null}">
                    <button style="background:#fff;border-radius:9999px;padding:8px;border:1px solid #e6eef8;cursor:pointer">
                        <img th:src="@{/images/nuces.jpg}" alt="profile" style="width:28px;height:28px;border-radius:9999px;vertical-align:middle" />
                    </button>
                    <div class="profile-menu">
                        <a th:href="@{/profile}">Profile</a>
                        <a th:href="@{/settings}">Settings</a>
                        <a th:href="@{/logout}">Logout</a>
                    </div>
                </div>
                <div th:if="${currentUser == null}">
                    <button style="background:#1d4ed8;color:white;padding:8px 12px;border-radius:9999px;border:none"><a th:href="@{/login}" style="color:inherit;text-decoration:none">Login / Sign Up</a></button>
                </div>
            </div>
        </div>
    </div>

    <form th:action="@{/}" method="get">
        <div class="search">
            <input type="text" name="q" placeholder="Search for a professor..." th:value="${q}" />
        </div>

        <div class="pills">
            <button type="submit" name="dept" value="All" th:classappend="${dept=='All'}? ' pill active' : ' pill'" class="pill">All</button>
            <button type="submit" name="dept" value="CS" th:classappend="${dept=='CS'}? ' pill active' : ' pill'" class="pill">CS</button>
            <button type="submit" name="dept" value="AI &amp; DS" th:classappend="${dept=='AI & DS'}? ' pill active' : ' pill'" class="pill">AI &amp; DS</button>
            <button type="submit" name="dept" value="SE" th:classappend="${dept=='SE'}? ' pill active' : ' pill'" class="pill">SE</button>
            <button type="submit" name="dept" value="Cyber Security" th:classappend="${dept=='Cyber Security'}? ' pill active' : ' pill'" class="pill">Cyber Security</button>
            <button type="submit" name="dept" value="Science And Humanities" th:classappend="${dept=='Science And Humanities'}? ' pill active' : ' pill'" class="pill">Science And Humanities</button>
        </div>
    </form>

    <div th:if="${#lists.isEmpty(faculty)}" class="center">
        <p class="meta">No faculty found matching "<span th:text="${q}"></span>" in <span th:text="${dept}"></span>.</p>
        <a href="/" style="color:#1d4ed8;margin-top:10px;display:inline-block">Clear filters</a>
    </div>

    <div class="grid">
        <a th:each="f : ${faculty}" th:href="@{/faculty/{id}(id=${f.id})}" style="text-decoration:none;color:inherit">
            <div class="card">
                <div class="info">
                    <h3 th:text="${f.name}">Prof Name</h3>
                    <div class="tag" th:text="${f.department}">CS</div>
                    <div class="meta" style="margin-top:8px"
                         th:if="${reviewCountByFacultyId[f.id] != null and reviewCountByFacultyId[f.id] > 0}"
                         th:text="${averageRatingByFacultyId[f.id] + '★ • ' + reviewCountByFacultyId[f.id] + ' Reviews'}">
                    </div>
                    <div class="meta" style="margin-top:8px"
                         th:if="${reviewCountByFacultyId[f.id] == null or reviewCountByFacultyId[f.id] == 0}">
                        New • 0 Reviews
                    </div>
                </div>
                <div class="avatar">
                    <img th:if="${f.imageUrl}" th:src="${f.imageUrl}" th:alt="${f.name}" style="width:100%;height:100%;object-fit:cover"/>
                    <div th:if="${f.imageUrl==null}" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:36px;color:#cbd5e1">👤</div>
                </div>
            </div>
        </a>
    </div>

</div>
</body>
</html>
